name: Build charts

# Generates the four analysis charts from live public Binance data
# and commits them back into outputs/charts/ so they show in the README.

on:
  workflow_dispatch:        # run on demand from the Actions tab
  schedule:
    - cron: "0 6 * * 1"     # every Monday at 06:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate charts from live Binance data
        run: python src/generate_charts.py

      - name: Commit charts if they changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/charts/*.png
          if git diff --staged --quiet; then
            echo "No chart changes to commit."
          else
            git commit -m "Update analysis charts from latest market data"
            git push
          fi
